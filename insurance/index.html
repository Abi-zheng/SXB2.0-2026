<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2563eb" />
    <title>诉讼保 · 机构端预审</title>
    <link rel="stylesheet" href="./assets/style.css?v=20260710-ins-scroll-chrome" />
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font:14px/1.6 -apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',sans-serif;color:#475569;background:#f8fafc;">
        正在加载机构端原型...
      </div>
    </div>
    <script>
      (function () {
        if (!window.location.hash) {
          window.location.replace(window.location.href + '#/');
        }

        function escapeHtml(value) {
          return String(value || '').replace(/[&<>"']/g, function (char) {
            return {
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#39;'
            }[char];
          });
        }

        function renderError(message) {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font:14px/1.6 -apple-system,BlinkMacSystemFont,Arial,sans-serif;color:#b91c1c;background:#fef2f2;text-align:center;">机构端原型加载失败：' + escapeHtml(message || '请查看浏览器控制台') + '</div>';
        }

        window.__ssbRenderStaticError = renderError;

        window.addEventListener('error', function (event) {
          var target = event && event.target;
          if (target && target !== window && target.tagName !== 'SCRIPT') {
            return;
          }
          if (target && target.tagName === 'SCRIPT') {
            renderError('脚本文件加载失败');
            return;
          }
          var detail = event && event.message && event.message !== 'Script error.' ? event.message : '脚本执行异常';
          if (event && event.filename) {
            detail += ' @ ' + event.filename + ':' + (event.lineno || 0) + ':' + (event.colno || 0);
          }
          if (event && event.error && event.error.stack) {
            detail += ' ' + event.error.stack;
          }
          renderError(detail);
        });

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason;
          renderError(reason && reason.message ? reason.message : '脚本执行异常');
        });

        window.setTimeout(function () {
          var root = document.getElementById('root');
          if (!root) return;
          var text = (root.textContent || '').replace(/\s+/g, '');
          if (text === '正在加载机构端原型...') {
            renderError('页面挂载超时，请刷新页面或检查脚本是否被浏览器拦截');
          }
        }, 6000);
      })();
    </script>
    <script defer src="./assets/app.js?v=20260710-ins-scroll-chrome" onerror="window.__ssbRenderStaticError && window.__ssbRenderStaticError('脚本文件加载失败')"></script>
  </body>
</html>
